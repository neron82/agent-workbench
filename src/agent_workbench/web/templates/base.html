<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Workbench{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='workbench.css') }}">
  <script defer src="{{ url_for('static', filename='chat-poll.js') }}"></script>
  <script>
    if ('EventSource' in window) {
      document.write('<script defer src="{{ url_for("static", filename="chat-stream.js") }}"><\/script>');
    }
  </script>
  <script>
    function getCsrfToken() {
      var meta = document.querySelector('meta[name="csrf-token"]');
      return meta ? meta.getAttribute('content') : '';
    }
  </script>
</head>
<body>
  <header class="app-nav">
    <a href="{{ url_for('channels.index') }}" class="brand" style="color:var(--ink);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      Workbench
    </a>
    <form class="workspace-switcher" method="get" action="{{ url_for('channels.index') }}">
      <label class="sr-only" for="workspace-select">Workspace</label>
      <select id="workspace-select" name="workspace_id" onchange="this.form.submit()"
              aria-label="Current workspace">
        {% for ws in workspaces %}
          <option value="{{ ws.workspace_id }}" {% if ws.workspace_id == current_workspace_id %}selected{% endif %}>{{ ws.name }}</option>
        {% endfor %}
      </select>
    </form>
    <nav class="nav-links">
      <a href="{{ url_for('channels.index', workspace_id=current_workspace_id, type='chat') }}"
         class="nav-chat{% if request.endpoint == 'channels.index' and request.args.get('type') == 'chat' %} active{% endif %}">Chat</a>
      <a href="{{ url_for('channels.index', workspace_id=current_workspace_id, type='research') }}"
         class="nav-research{% if request.endpoint == 'channels.index' and request.args.get('type') == 'research' %} active{% endif %}">Research</a>
      <a href="{{ url_for('channels.index', workspace_id=current_workspace_id, type='work') }}"
         class="nav-work{% if request.endpoint == 'channels.index' and request.args.get('type') == 'work' %} active{% endif %}">Work</a>
    </nav>
    {% if current_workspace_id %}
      <a href="{{ url_for('channels.workspace_settings', workspace_id=current_workspace_id) }}" class="nav-settings">⚙ Workspace</a>
    {% endif %}
    <a href="{{ url_for('settings.index') }}" class="nav-settings">⚙ Settings</a>
  </header>

  <main class="{% if request.endpoint and request.endpoint in ('sessions.show_session',) %}wide{% endif %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      <div aria-live="polite" role="alert">
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
      </div>
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
