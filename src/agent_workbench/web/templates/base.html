<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Workbench{% endblock %}</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-secondary: #141414;
      --panel: #1a1a1a;
      --panel-hover: #222;
      --border: #2a2a2a;
      --border-light: #333;
      --ink: #e8e8e8;
      --ink-secondary: #888;
      --ink-muted: #555;
      --accent: #4a9eff;
      --accent-bg: rgba(74, 158, 255, 0.1);
      --accent-border: rgba(74, 158, 255, 0.25);
      --chat: #4ade80;
      --chat-bg: rgba(74, 222, 128, 0.1);
      --research: #c084fc;
      --research-bg: rgba(192, 132, 252, 0.1);
      --work: #fb923c;
      --work-bg: rgba(251, 146, 60, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --code-bg: #1e1e1e;
      --warn-bg: rgba(251, 191, 36, 0.15);
      --warn-ink: #fbbf24;
      --err-bg: rgba(239, 68, 68, 0.15);
      --err-ink: #f87171;
      --success-bg: rgba(74, 222, 128, 0.15);
      --success-ink: #4ade80;
      --radius: 8px;
      --radius-sm: 4px;
      --radius-lg: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #7ab8ff; }

    /* ── Top Navigation ── */
    header.app-nav {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header.app-nav .brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
      margin-right: 20px;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header.app-nav .brand svg { width: 20px; height: 20px; }
    header.app-nav .nav-links {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    header.app-nav .nav-links a {
      padding: 8px 16px;
      border-radius: var(--radius);
      color: var(--ink-secondary);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      position: relative;
    }
    header.app-nav .nav-links a:hover {
      color: var(--ink);
      background: var(--panel);
      text-decoration: none;
    }
    header.app-nav .nav-links a.active {
      color: var(--ink);
      background: var(--panel);
    }
    header.app-nav .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 16px;
      right: 16px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }
    header.app-nav .nav-links a.nav-chat.active::after { background: var(--chat); }
    header.app-nav .nav-links a.nav-research.active::after { background: var(--research); }
    header.app-nav .nav-links a.nav-work.active::after { background: var(--work); }
    header.app-nav .nav-settings {
      margin-left: auto;
      padding: 6px 12px;
      border-radius: var(--radius);
      color: var(--ink-secondary);
      font-size: 13px;
      transition: all 0.15s;
    }
    header.app-nav .nav-settings:hover {
      color: var(--ink);
      background: var(--panel);
      text-decoration: none;
    }

    /* ── Main Layout ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    main.wide { max-width: 100%; padding: 0; }
    h1, h2, h3, h4 { margin: 0 0 12px 0; font-weight: 600; }
    h1 { font-size: 22px; letter-spacing: -0.02em; }
    h2 { font-size: 17px; }
    h3 { font-size: 15px; }
    h4 { font-size: 14px; }

    /* ── Cards / Panels ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-hover:hover {
      border-color: var(--border-light);
      background: var(--panel-hover);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-header h2, .card-header h3 { margin: 0; }

    /* ── Session Type Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-chat { background: var(--chat-bg); color: var(--chat); }
    .badge-research { background: var(--research-bg); color: var(--research); }
    .badge-work { background: var(--work-bg); color: var(--work); }
    .badge-system { background: var(--panel); color: var(--ink-muted); }
    .badge-active { background: var(--success-bg); color: var(--success-ink); }
    .badge-done { background: var(--panel); color: var(--ink-muted); }
    .badge-failed { background: var(--err-bg); color: var(--err-ink); }
    .badge-blocked { background: var(--warn-bg); color: var(--warn-ink); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--radius);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-light); background: var(--panel-hover); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon {
      padding: 6px;
      border: none;
      background: transparent;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      line-height: 1;
    }
    .btn-icon:hover { color: var(--ink); background: var(--panel); }
    form.inline { display: inline; }

    /* ── Inputs ── */
    input[type="text"],
    input[type="number"],
    input[type="search"],
    select,
    textarea {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font: inherit;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }
    textarea { resize: vertical; }
    label { font-weight: 500; font-size: 13px; color: var(--ink-secondary); }
    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    /* ── Session List ── */
    .session-list { list-style: none; padding: 0; margin: 0; }
    .session-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      background: var(--panel);
      transition: all 0.15s;
      cursor: pointer;
    }
    .session-list li:hover {
      border-color: var(--border-light);
      background: var(--panel-hover);
    }
    .session-list li .session-info { flex: 1; min-width: 0; }
    .session-list li .session-title {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .session-list li .session-meta {
      font-size: 12px;
      color: var(--ink-secondary);
    }
    .session-list li .session-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── Chat Interface ── */
    .chat-layout {
      display: flex;
      height: calc(100vh - 52px);
      max-width: 100%;
    }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .back-btn {
      color: var(--ink-secondary);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 18px;
      line-height: 1;
    }
    .chat-header .back-btn:hover { color: var(--ink); background: var(--panel); text-decoration: none; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-input-area {
      padding: 12px 24px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-input-row textarea {
      flex: 1;
      min-height: 44px;
      max-height: 200px;
      padding: 11px 14px;
      border-radius: var(--radius-lg);
      background: var(--panel);
      border-color: var(--border);
      font-size: 14px;
      line-height: 1.4;
    }
    .chat-input-row textarea:focus {
      border-color: var(--accent);
    }
    .chat-input-row .btn-primary {
      height: 44px;
      padding: 0 20px;
      border-radius: var(--radius-lg);
    }

    /* ── Message Bubbles ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      margin-bottom: 2px;
    }
    .msg-own { align-self: flex-end; flex-direction: row-reverse; }
    .msg-other { align-self: flex-start; }
    .msg-system { align-self: center; max-width: 70%; }
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 11px;
      flex-shrink: 0;
      color: #fff;
    }
    .msg-avatar-user { background: var(--accent); }
    .msg-avatar-agent { background: var(--chat); }
    .msg-avatar-system { background: var(--ink-muted); }
    .msg-bubble {
      padding: 8px 14px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .msg-own .msg-bubble {
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-bottom-right-radius: 4px;
    }
    .msg-other .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-system .msg-bubble {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink-secondary);
      text-align: center;
      padding: 6px 12px;
    }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .msg-name { font-weight: 600; font-size: 12px; }
    .msg-time { font-size: 10px; color: var(--ink-muted); }
    .msg-text { white-space: pre-wrap; }
    .msg-text p { margin: 0 0 6px; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text code {
      background: var(--code-bg);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 13px;
      font-family: var(--mono);
    }
    .msg-text pre {
      background: var(--code-bg);
      padding: 10px 12px;
      border-radius: var(--radius);
      overflow-x: auto;
      font-size: 13px;
      font-family: var(--mono);
      margin: 6px 0;
    }

    /* ── Tool Call Bubble (compressed) ── */
    .msg-toolcall {
      align-self: center;
      max-width: 75%;
    }
    .msg-toolcall .msg-bubble {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg-toolcall .msg-bubble:hover {
      border-color: var(--accent);
    }
    .toolcall-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-secondary);
    }
    .toolcall-summary .toolcall-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }
    .toolcall-summary .toolcall-icon-shell { background: var(--chat-bg); color: var(--chat); }
    .toolcall-summary .toolcall-icon-hermes { background: var(--accent-bg); color: var(--accent); }
    .toolcall-summary .toolcall-icon-opencode { background: var(--research-bg); color: var(--research); }
    .toolcall-summary .toolcall-name { font-weight: 500; color: var(--ink); }
    .toolcall-summary .toolcall-status { margin-left: auto; }
    .toolcall-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .toolcall-status-dot.completed { background: var(--chat); }
    .toolcall-status-dot.failed { background: var(--danger); }
    .toolcall-status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Tool Confirmation Buttons ── */
    .toolcall-confirm-row {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }
    .toolcall-confirm-row .btn-sm {
      font-size: 11px;
      padding: 3px 8px;
    }
    .toolcall-confirm-row .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .toolcall-confirm-row .btn-primary:hover { filter: brightness(1.1); }
    .toolcall-confirm-resolved span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 4px;
    }
    .toolcall-result-badge {
      font-size: 10px !important;
      margin-left: 4px;
    }

    /* ── Work Status Text (inside agent bubbles) ── */
    .work-status-text {
      font-weight: 600;
      font-size: 13px;
    }
    .work-status-text.working { color: var(--accent); }
    .work-status-text.completed { color: var(--chat); }
    .work-status-text.stopped { color: var(--warn-ink); }
    .msg-work-bubble { cursor: pointer; }
    .msg-work-bubble:hover { border-color: var(--accent) !important; }

    /* ── Tool Call Detail Panel (right sidebar) ── */
    .toolcall-detail-panel {
      width: 0;
      overflow: hidden;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      transition: width 0.2s ease;
      flex-shrink: 0;
    }
    .toolcall-detail-panel.open {
      width: 420px;
    }
    .toolcall-detail-panel .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolcall-detail-panel .panel-header h3 { margin: 0; flex: 1; font-size: 14px; }
    .toolcall-detail-panel .panel-body {
      padding: 16px 20px;
      overflow-y: auto;
      height: calc(100% - 53px);
    }
    .toolcall-detail-panel .detail-section {
      margin-bottom: 16px;
    }
    .toolcall-detail-panel .detail-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }
    .toolcall-detail-panel .detail-section pre {
      background: var(--code-bg);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--mono);
      overflow-x: auto;
      margin: 0;
    }
    .toolcall-detail-panel .detail-section .kv-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
      padding: 4px 0;
    }
    .toolcall-detail-panel .detail-section .kv-row .k {
      color: var(--ink-secondary);
      width: 100px;
      flex-shrink: 0;
    }

    /* ── Landing Page ── */
    .landing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }
    .landing-grid .full-width { grid-column: 1 / -1; }
    .start-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .start-card h2 { margin-bottom: 16px; }
    .start-options {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .start-option {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--bg);
    }
    .start-option:hover { border-color: var(--accent); }
    .start-option.selected {
      border-color: var(--accent);
      background: var(--accent-bg);
    }
    .start-option .option-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .start-option .option-label {
      font-size: 13px;
      font-weight: 500;
    }
    .start-option .option-desc {
      font-size: 11px;
      color: var(--ink-secondary);
      margin-top: 2px;
    }

    /* ── Recent Sessions ── */
    .recent-sessions { margin-top: 24px; }
    .recent-sessions h2 { margin-bottom: 12px; }
    .session-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 4px;
      background: var(--panel);
      transition: all 0.15s;
    }
    .session-row:hover {
      border-color: var(--border-light);
      background: var(--panel-hover);
    }
    .session-row .sess-info { flex: 1; min-width: 0; }
    .session-row .sess-title { font-weight: 500; font-size: 13px; }
    .session-row .sess-meta { font-size: 11px; color: var(--ink-secondary); margin-top: 1px; }
    .session-row .sess-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ── Flash Messages ── */
    .flash {
      padding: 8px 14px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .flash.success { background: var(--success-bg); color: var(--success-ink); border-color: rgba(74, 222, 128, 0.2); }
    .flash.error { background: var(--err-bg); color: var(--err-ink); border-color: rgba(239, 68, 68, 0.2); }
    .flash.info { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
    .flash.warning { background: var(--warn-bg); color: var(--warn-ink); border-color: rgba(251, 191, 36, 0.2); }

    /* ── Misc ── */
    code, pre { font-family: var(--mono); }
    code {
      background: var(--code-bg);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    pre { padding: 10px 12px; overflow-x: auto; font-size: 12px; line-height: 1.4; }
    .muted { color: var(--ink-secondary); font-size: 12px; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .items-center { align-items: center; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .text-center { text-align: center; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Settings ── */
    .settings-layout {
      display: flex;
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .settings-sidebar {
      width: 200px;
      flex-shrink: 0;
    }
    .settings-sidebar a {
      display: block;
      padding: 8px 12px;
      border-radius: var(--radius);
      color: var(--ink-secondary);
      font-size: 13px;
      margin-bottom: 2px;
      transition: all 0.15s;
    }
    .settings-sidebar a:hover {
      color: var(--ink);
      background: var(--panel);
      text-decoration: none;
    }
    .settings-sidebar a.active {
      color: var(--ink);
      background: var(--panel);
      font-weight: 500;
    }
    .settings-content { flex: 1; min-width: 0; }
    .settings-section { margin-bottom: 24px; }
    .settings-section h2 {
      font-size: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .settings-table {
      width: 100%;
      border-collapse: collapse;
    }
    .settings-table th, .settings-table td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .settings-table th {
      color: var(--ink-secondary);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .settings-table tr:hover td { background: var(--panel-hover); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { color: var(--ink-secondary); }
  </style>
  <script defer src="{{ url_for('static', filename='chat-poll.js') }}"></script>
  <script>
    if ('EventSource' in window) {
      document.write('<script defer src="{{ url_for("static", filename="chat-stream.js") }}"><\/script>');
    }
  </script>
</head>
<body>
  <header class="app-nav">
    <a href="{{ url_for('channels.index') }}" class="brand" style="color:var(--ink);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      Workbench
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('channels.list_by_type', session_type='chat') }}"
         class="nav-chat{% if request.endpoint and request.view_args and request.view_args.get('session_type') == 'chat' and request.endpoint == 'channels.list_by_type' %} active{% endif %}">Chat</a>
      <a href="{{ url_for('channels.list_by_type', session_type='research') }}"
         class="nav-research{% if request.endpoint and request.view_args and request.view_args.get('session_type') == 'research' and request.endpoint == 'channels.list_by_type' %} active{% endif %}">Research</a>
      <a href="{{ url_for('channels.list_by_type', session_type='work') }}"
         class="nav-work{% if request.endpoint and request.view_args and request.view_args.get('session_type') == 'work' and request.endpoint == 'channels.list_by_type' %} active{% endif %}">Work</a>
    </nav>
    <a href="{{ url_for('settings.index') }}" class="nav-settings">⚙ Settings</a>
  </header>

  <main class="{% if request.endpoint and request.endpoint in ('sessions.show_session',) %}wide{% endif %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
