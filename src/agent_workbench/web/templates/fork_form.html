<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fork session {{ parent.session_id[:8] }}… · Agent Workbench</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
    label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
    input[type=text], textarea, select { width: 100%; box-sizing: border-box; padding: 0.5rem; font-size: 0.95rem; border: 1px solid #ccc; border-radius: 4px; }
    textarea { min-height: 90px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .help { color: #666; font-size: 0.8rem; margin-top: 0.15rem; }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
    .actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; align-items: center; }
    button { padding: 0.5rem 1rem; font-size: 0.95rem; cursor: pointer; background: #2563eb; color: white; border: 0; border-radius: 4px; }
    button.secondary { background: #e5e7eb; color: #111; }
    a.cancel { color: #555; text-decoration: none; }
    .error { background: #fee2e2; color: #991b1b; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .badge.chat { background: #e0e7ff; color: #3730a3; }
    .badge.research { background: #fef3c7; color: #92400e; }
    .badge.work { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
  <p><a href="{{ url_for('forks.show_fork_detail', fork_id='_') }}">← All forks</a></p>
  <h1>Fork session</h1>
  <p class="subtitle">
    Parent: <code>{{ parent.session_id }}</code>
    <span class="badge {{ parent.session_type }}">{{ parent.session_type }}</span>
  </p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('forks.create_fork', session_id=parent.session_id) }}">
    <div class="row">
      <div>
        <label for="new_session_type">Current type</label>
        <input type="text" value="{{ parent.session_type }}" disabled />
      </div>
      <div>
        <label for="new_session_type">New type</label>
        <select id="new_session_type" name="new_session_type" required>
          {% for t in session_types %}
            <option value="{{ t }}" {% if form_data.new_session_type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
        <p class="help">
          Per spec, type changes go through a structured fork rather than in-place mutation.
        </p>
      </div>
    </div>

    <label for="summary">Summary <span style="color:#b91c1c">*</span></label>
    <textarea id="summary" name="summary" required placeholder="Concise summary of the parent session at the point of the fork.">{{ form_data.summary }}</textarea>
    <p class="help">Required. This is the primary inheritance payload for the child session.</p>

    <label for="fork_reason">Fork reason</label>
    <input type="text" id="fork_reason" name="fork_reason" value="{{ form_data.fork_reason }}" placeholder="e.g. Promote to Work after research sign-off" />

    <label for="decisions">Decisions (JSON object, optional)</label>
    <textarea id="decisions" name="decisions" placeholder='{"approach": "..."}'>{{ form_data.decisions }}</textarea>

    <label for="assumptions">Assumptions (JSON object, optional)</label>
    <textarea id="assumptions" name="assumptions" placeholder='{"env": "linux"}'>{{ form_data.assumptions }}</textarea>

    <label for="open_questions">Open questions (JSON object, optional)</label>
    <textarea id="open_questions" name="open_questions" placeholder='{"q1": "..."}'>{{ form_data.open_questions }}</textarea>

    <div class="actions">
      <button type="submit">Create fork</button>
      <a class="cancel" href="{{ url_for('forks.show_fork_form', session_id=parent.session_id) }}">Reset</a>
    </div>
  </form>
</body>
</html>
